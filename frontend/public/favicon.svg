<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ff2da0"/>
      <stop offset="50%"  stop-color="#c026d3"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="100" height="100" rx="18" fill="#020208"/>

  <!-- Destello principal — 4 puntas -->
  <path filter="url(#glow)" fill="url(#g)"
    d="M50,10 C50,10 47,38 50,50 C53,38 50,10 50,10 Z
       M50,90 C50,90 53,62 50,50 C47,62 50,90 50,90 Z
       M10,50 C10,50 38,53 50,50 C38,47 10,50 10,50 Z
       M90,50 C90,50 62,47 50,50 C62,53 90,50 90,50 Z"/>

  <!-- Destellos pequeños -->
  <path filter="url(#glow)" fill="url(#g)" opacity="0.7"
    d="M75,22 C75,22 73,30 75,34 C77,30 75,22 75,22 Z
       M75,46 C75,46 77,38 75,34 C73,38 75,46 75,46 Z
       M67,34 C67,34 75,36 79,34 C75,32 67,34 67,34 Z
       M83,34 C83,34 75,32 71,34 C75,36 83,34 83,34 Z"/>

  <path filter="url(#glow)" fill="url(#g)" opacity="0.5"
    d="M25,65 C25,65 23,70 25,73 C27,70 25,65 25,65 Z
       M25,81 C25,81 27,76 25,73 C23,76 25,81 25,81 Z
       M19,73 C19,73 24,75 27,73 C24,71 19,73 19,73 Z
       M31,73 C31,73 26,71 23,73 C26,75 31,73 31,73 Z"/>
</svg>
